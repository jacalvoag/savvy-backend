version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: savvy-backend
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    networks:
      - savvy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  # Referencia al servicio de Postgres (debe estar corriendo via savvy-infra)
  # Esta sección solo existe para documentar la dependencia
  # En producción, comentar o remover este bloque si Postgres corre separado
  postgres:
    image: postgres:16-alpine
    container_name: savvy-postgres
    external: true  # Este container viene de savvy-infra

networks:
  savvy-network:
    external: true
    name: savvy-network
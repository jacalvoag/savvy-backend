version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savvy-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    networks:
      - savvy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  savvy-network:
    external: true
    name: savvy-network
